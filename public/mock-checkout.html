<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout (Mock)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .checkout-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .powered-by {
            color: #6366f1;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .amount {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #1a202c;
        }

        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .test-badge {
            background: #fed7d7;
            color: #c53030;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="checkout-box">
        <div class="test-badge">TEST MODE</div>
        <div class="powered-by"><i class="fab fa-stripe"></i> stripe (MOCK)</div>
        <p style="color: #4a5568; margin-bottom: 10px;">Pay Luminary Books</p>
        <div class="amount" id="amountDisplay">$0.00</div>

        <p style="text-align: left; font-size: 0.9rem; margin-bottom: 5px; color: #4a5568;">Card Information</p>
        <div
            style="border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; margin-bottom: 20px; text-align: left; background: #f8fafc; color: #a0aec0;">
            <span style="color: #4a5568;">4242 4242 4242 4242</span> <span style="float: right;">12/30 CVC</span>
        </div>

        <button class="btn" onclick="processPayment()">Pay Now</button>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #a0aec0;">This is a local development mock. No real money
            is moved.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect');
        const amountCents = urlParams.get('amount') || 0;

        document.getElementById('amountDisplay').innerText = `$${(amountCents / 100).toFixed(2)}`;

        function processPayment() {
            document.querySelector('.btn').innerText = 'Processing...';
            document.querySelector('.btn').style.opacity = '0.7';
            setTimeout(() => {
                if (redirectUrl) window.location.href = redirectUrl;
            }, 1000);
        }
    </script>
</body>

</html>
