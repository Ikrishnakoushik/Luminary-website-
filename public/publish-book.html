<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish a Book | Luminary</title>
    <!-- Use same theme-loader as the rest of the app -->
    <script src="/theme-loader.js"></script>
    <style>
        :root {
            --primary: #8A2BE2;
            --primary-light: #9d4edd;
            --bg: #0f1016;
            --surface: rgba(30, 30, 36, 0.6);
            --surface-hover: rgba(45, 45, 55, 0.8);
            --text: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(15, 16, 22, 0.85);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.05), transparent 25%);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            background: linear-gradient(to right, #b366ff, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .main-container {
            margin-top: 70px;
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            box-sizing: border-box;
            margin-left: auto;
            margin-right: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h2 {
            font-size: 2rem;
            margin: 0;
        }

        .back-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--text);
        }

        /* Form Styling - Premium Look */
        .form-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Content Editor Customization */
        .editor-container {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 10px;
            transition: border-color 0.3s;
        }

        .editor-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.15);
        }

        .editor-toolbar {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .editor-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .editor-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .editor-area {
            min-height: 450px;
            padding: 30px;
            outline: none;
            font-family: 'Merriweather', 'Georgia', serif;
            line-height: 1.8;
            font-size: 1.15rem;
            overflow-y: auto;
            max-height: 60vh;
            color: #f1f5f9;
        }

        .editor-area h1 {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 20px;
        }

        .editor-area h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 15px;
        }

        .editor-area blockquote {
            border-left: 4px solid var(--primary);
            margin: 20px 0;
            padding: 10px 20px;
            font-style: italic;
            color: #cbd5e1;
            background: rgba(138, 43, 226, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), #b366ff);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.6);
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <a href="/books.html" class="nav-logo">
            <i class="fas fa-book-open"></i> Luminary Books
        </a>
        <div class="nav-links">
            <a href="/main.html" class="nav-link"><i class="fas fa-home"></i> App Home</a>
            <a href="/books.html" class="nav-link"><i class="fas fa-swatchbook"></i> Library</a>
            <a href="#" class="nav-link" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="main-container">
        <div class="header">
            <h2>Publish a Book</h2>
            <a href="/books.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Library
            </a>
        </div>

        <div class="form-container">
            <form id="publishForm">
                <div class="form-group">
                    <label for="bookTitle">Book Title</label>
                    <input type="text" id="bookTitle" class="form-control" placeholder="e.g. The Winds of Change"
                        required>
                </div>

                <div class="form-group">
                    <label for="bookDescription">Description / Synopsis</label>
                    <textarea id="bookDescription" class="form-control" rows="4"
                        placeholder="What is this book about? Provide a compelling summary to attract readers."
                        required></textarea>
                </div>

                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 2;">
                        <label for="bookCover">Cover Image URL (Optional)</label>
                        <input type="url" id="bookCover" class="form-control"
                            placeholder="https://example.com/cover.jpg">
                    </div>

                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label for="bookPrice">Sale Price ($)</label>
                        <input type="number" id="bookPrice" class="form-control" min="0" step="0.01" value="0" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Manuscript Designer</label>
                    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 15px;">Write and format
                        your text exactly as readers will see it.</p>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button type="button" class="editor-btn" onclick="formatDoc('bold')" title="Bold"><i
                                    class="fas fa-bold"></i></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('italic')" title="Italic"><i
                                    class="fas fa-italic"></i></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('underline')"
                                title="Underline"><i class="fas fa-underline"></i></button>
                            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 5px;">
                            </div>
                            <button type="button" class="editor-btn" onclick="formatDoc('formatBlock', 'H1')"
                                title="Heading 1"><i class="fas fa-heading"></i><span
                                    style="font-size:10px;margin-left:2px;">1</span></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('formatBlock', 'H2')"
                                title="Heading 2"><i class="fas fa-heading"></i><span
                                    style="font-size:10px;margin-left:2px;">2</span></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('formatBlock', 'blockquote')"
                                title="Quote"><i class="fas fa-quote-right"></i></button>
                            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 5px;">
                            </div>
                            <button type="button" class="editor-btn" onclick="formatDoc('justifyLeft')"
                                title="Align Left"><i class="fas fa-align-left"></i></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('justifyCenter')"
                                title="Align Center"><i class="fas fa-align-center"></i></button>
                            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 5px;">
                            </div>
                            <button type="button" class="editor-btn" onclick="formatDoc('insertUnorderedList')"
                                title="Bullet List"><i class="fas fa-list-ul"></i></button>
                            <button type="button" class="editor-btn" onclick="formatDoc('insertOrderedList')"
                                title="Numbered List"><i class="fas fa-list-ol"></i></button>
                        </div>
                        <!-- The editable area for book content -->
                        <div id="bookContent" class="editor-area" contenteditable="true"
                            placeholder="Start writing your masterpiece..."></div>
                    </div>
                </div>

                <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-circle"
                        style="margin-right:8px;"></i><span></span></div>

                <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-rocket"
                        style="margin-right: 10px;"></i> Publish to Luminary</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/auth.html';
        }

        // Check if user is publisher
        async function checkRole() {
            try {
                const res = await fetch(`${API_URL}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    if (user.role !== 'publisher') {
                        alert('Only publishers can create books.');
                        window.location.href = '/books.html';
                    }
                }
            } catch (err) {
                console.error("Error fetching user:", err);
            }
        }

        checkRole();

        // Editor Formatting function
        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            document.getElementById('bookContent').focus();
        }

        // Submit form
        document.getElementById('publishForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            const title = document.getElementById('bookTitle').value;
            const description = document.getElementById('bookDescription').value;
            const coverImage = document.getElementById('bookCover').value;
            const price = parseFloat(document.getElementById('bookPrice').value) || 0;
            const content = document.getElementById('bookContent').innerHTML;

            if (!content || content.trim() === '') {
                errorMsg.textContent = 'Book content cannot be empty.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Publishing...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/books`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title,
                        description,
                        coverImage,
                        price,
                        content
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('Book published successfully!');
                    window.location.href = '/books.html';
                } else {
                    errorMsg.querySelector('span').textContent = data.msg || 'Error publishing book.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket" style="margin-right: 10px;"></i> Publish to Luminary';
                }
            } catch (err) {
                console.error('Error:', err);
                errorMsg.querySelector('span').textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-rocket" style="margin-right: 10px;"></i> Publish to Luminary';
            }
        });

        // Setup Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/auth.html';
        });
    </script>
</body>

</html>
